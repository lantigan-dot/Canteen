  <style>
      .app-version { font-size: 11px; color: var(--text-secondary); margin-top: 4px; opacity: 0.7; }

    }
    [data-theme="dark"] {

      --color-border:#393836; --color-divider:#262523; --color-text:#e4e0d8; --color-text-muted:#a7a39a; --color-text-faint:#6e6b64;
      --color-text-inverse:#171614; --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#273436;
      --color-success:#6daa45; --color-warning:#bb653b; --color-error:#d163a7; --color-blue:#5591c7;
      --shadow-sm:0 1px 2px rgb(0 0 0 / 0.2); --shadow-md:0 4px 12px rgb(0 0 0 / 0.3); --shadow-lg:0 12px 32px rgb(0 0 0 / 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; overflow:hidden; }
    body { min-height:100dvh; line-height:1.5; font-family:var(--font-body); font-size:var(--text-base); color:var(--color-text); background:var(--color-bg); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
    button, input, select, textarea { font:inherit; color:inherit; }
    button { cursor:pointer; border:none; background:none; }
    img, svg { display:block; max-width:100%; }
    a { color:inherit; text-decoration:none; }
    :focus-visible { outline:2px solid var(--color-primary); outline-offset:2px; border-radius:var(--radius-sm); }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    .hidden { display:none !important; }

    .auth-layout { width:min(1160px, 100%); display:grid; grid-template-columns:1fr 420px; gap:var(--space-5); }
    .auth-showcase, .auth-card, .stat-card, .panel, .mini-card, .customer-menu-card, .queue-item, .timeline-card, .payment-method, .info-row, .menu-group, .calendar-cell, .dish-row, .menu-row { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); }
    .auth-showcase { padding:var(--space-8); display:grid; gap:var(--space-5); background:linear-gradient(145deg, var(--color-surface), var(--color-surface-offset)); }

    .brand h1 { font-size:var(--text-lg); font-weight:700; line-height:1.15; }

    .role-button.active, .role-button:hover, .nav-button.active, .nav-button:hover { background:var(--color-primary-highlight); color:var(--color-primary); }

    .header-title h2 { font-size:var(--text-xl); font-weight:700; line-height:1.05; }
    .header-title p { font-size:var(--text-sm); color:var(--color-text-muted); margin-top:var(--space-1); }
    .header-actions { display:flex; align-items:center; gap:var(--space-3); flex-wrap:wrap; }

    .search input { width:100%; background:transparent; border:none; outline:none; font-size:var(--text-sm); }
    .theme-toggle { width:44px; height:44px; border-radius:var(--radius-full); display:grid; place-items:center; background:var(--color-surface); border:1px solid var(--color-border); }
    .main { grid-column:2; overflow-y:auto; padding:var(--space-5); }
    .view { display:none; gap:var(--space-5); }
    .view.active { display:grid; }
    .grid-top { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:var(--space-4); }
    .stat-card { padding:var(--space-4); }
    .stat-card span { font-size:var(--text-xs); color:var(--color-text-muted); text-transform:uppercase; letter-spacing:0.06em; }
    .stat-card strong { display:block; margin-top:var(--space-2); font-size:var(--text-xl); font-weight:700; font-variant-numeric:tabular-nums; }
    .stat-card small { display:block; margin-top:var(--space-2); font-size:var(--text-xs); color:var(--color-text-muted); }
    .dashboard-grid, .queue-grid, .customer-grid, .split, .two-cols, .payment-grid, .customer-menu-grid { display:grid; gap:var(--space-4); }
    .dashboard-grid { grid-template-columns:1.55fr 1fr; }
    .queue-grid { grid-template-columns:1.2fr 1fr; }
    .customer-grid { grid-template-columns:1.45fr 0.82fr; align-items:start; }
    .customer-grid > .panel { margin-top:0; align-self:start; }
    .split { grid-template-columns:1.05fr 1.1fr; }
    .two-cols, .payment-grid { grid-template-columns:1fr 1fr; }
    .customer-menu-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
    .panel, .auth-card, .auth-showcase { padding:var(--space-4); }
    .panel-header, .queue-item-head, .customer-menu-header, .payment-top, .customer-menu-footer, .payment-footer, .summary-row, .calendar-date { display:flex; justify-content:space-between; gap:var(--space-3); align-items:flex-start; flex-wrap:wrap; }
    .list, .table, .info-list, .order-line, .payment-methods, .order-items, .menu-groups, .calendar-items, .line-steps { display:grid; gap:var(--space-3); }
    .order-items.compact { gap:var(--space-2); }

    .visitor-calendar { display:grid; gap:var(--space-3); background:var(--color-surface-2); border:1px solid var(--color-border); border-radius:var(--radius-xl); padding:var(--space-4); margin-bottom:var(--space-4); }

    .calendar-nav-btn { width:36px; height:36px; border-radius:var(--radius-full); border:1px solid var(--color-border); background:var(--color-surface); display:grid; place-items:center; }
    .visitor-calendar-weekdays span { text-align:center; font-size:var(--text-xs); color:var(--color-text-muted); }
    .visitor-calendar-grid { display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); grid-auto-rows:48px; gap:var(--space-2); align-items:stretch; }

    .visitor-date-number { display:block !important; font-size:14px !important; line-height:1 !important; font-weight:700 !important; color:var(--color-text) !important; opacity:1 !important; visibility:visible !important; text-indent:0 !important; -webkit-text-fill-color:var(--color-text) !important; }
    .visitor-date-cell.has-menu::after, .visitor-date-cell.active::after { content:''; position:absolute; bottom:6px; width:6px; height:6px; border-radius:50%; background:var(--color-primary); }
    .visitor-date-cell.active { background:var(--color-primary-highlight); border-color:color-mix(in oklab, var(--color-primary) 35%, var(--color-border)); }
    .visitor-date-cell.active .visitor-date-number { color:var(--color-primary) !important; -webkit-text-fill-color:var(--color-primary) !important; }
    .visitor-date-cell.today { box-shadow:inset 0 0 0 1px color-mix(in oklab, var(--color-primary) 25%, var(--color-border)); }

    .visitor-calendar-legend .dot.selected { box-shadow:0 0 0 3px var(--color-primary-highlight); }
    .dish-row { display:grid; grid-template-columns:84px 1.2fr 1fr auto; gap:var(--space-4); padding:var(--space-3); align-items:center; background:var(--color-surface-2); }
    .dish-photo { width:84px; height:84px; border-radius:var(--radius-lg); background:var(--color-surface-offset); object-fit:cover; }
    .dish-photo-panel { width:100%; height:180px; border-radius:var(--radius-lg); background-color:var(--color-surface-offset); overflow:hidden; border:1px solid color-mix(in srgb, var(--color-border) 70%, white); }
    .dish-photo-panel svg { width:100%; height:100%; display:block; }
    .price { font-size:var(--text-base); font-weight:700; font-variant-numeric:tabular-nums; }
    .row-actions { display:flex; gap:var(--space-2); flex-wrap:wrap; justify-content:flex-end; }

    .calendar-item.primary { background:var(--color-primary-highlight); color:var(--color-primary); }
    .info-row, .queue-item, .timeline-card, .payment-method, .customer-menu-card { padding:var(--space-4); background:var(--color-surface-2); }
    .queue-item, .customer-menu-card, .payment-method, .timeline-card { display:grid; gap:var(--space-3); }

    .catalog-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:var(--space-4); }

    .catalog-actions { display:flex; gap:var(--space-2); flex-wrap:wrap; padding-top:var(--space-3); border-top:1px солид var(--color-divider); }
    .dialog-backdrop { position:fixed; inset:0; background:rgba(25,25,25,0.35); display:none; align-items:center; justify-content:center; padding:var(--space-6); z-index:50; }
